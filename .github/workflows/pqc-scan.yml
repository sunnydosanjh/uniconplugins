name: PQC Scan
# Qryptive scans your code for quantum-vulnerable cryptography (RSA, ECC, DES, etc).
# The scanner runs in this GitHub Actions runner — your code never leaves.
# Findings appear as PR annotations and in the Security tab.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      migration_mode:
        description: "Fix migration mode for explicit repo-level fix"
        required: false
        default: pqc_only
      fix_run_id:
        description: "Platform fix-run correlation id (set by Qryptive dispatch)"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the action can diff PR base...HEAD for scan_scope=changed

      - name: PQC scan
        uses: qryptive/pqc-scanner-action@v1
        with:
          scan_scope: ${{ github.event_name == 'workflow_dispatch' && 'all' || 'changed' }}
          severity_threshold: medium
          fail_on_vulnerable: false
          report_format: sarif
          pqc_api_key: ${{ secrets.PQC_API_KEY }}

      - name: Upload findings to Security tab
        if: always() && hashFiles('pqc-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pqc-results.sarif
          category: qryptive-pqc
